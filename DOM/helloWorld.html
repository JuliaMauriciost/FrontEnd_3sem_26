<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function saudacao(){
            alert(`Título: ${document.getElementById('titulo').textContent}`);
        }

        function mouseMoveu(){
            alert("Mouse se moveu no botão");
        }

        function clicouBaixo(){
            alert("Mouse se moveu no botão");
        }

        function clicouSubiu(){
            alert("Você soltou o botão do mouse");
        }

        function cliqueDuplo(){
            alert("VocÇe clicou duas vezes no botão do mouse");
        }
    </script>
</head>
<body>
    <h1 id="titulo">Olá, eu sou o título da página.</h1>
    <button onclick="saudacao();">Click aqui</button>
    <button onmousemove="mouseMoveu();">Passe o mouse</button>
    <button onmousedown="clicouBaixo();">Segurar o click</button>
    <button onmouseup="clicouSubiu();">Solta o click</button>
    <button onmouseup="clicouSubiu();">CLica 2 vezes aqui</button>
</body>
</html>
