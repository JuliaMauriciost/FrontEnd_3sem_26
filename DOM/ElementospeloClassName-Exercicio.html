<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .corsim{
            color: green;
        }

        .cornao{
            color: red;
        }
    </style>
</head>
<body>

    <input type="text" id="fruta" placeholder="Digite o nome da fruta">
        <select name="" id="nomeClasse">
            <option value="">Selecione</option>
            <option value="corsim">CorSim</option>
            <option value="cornao">CorNao</option>
        </select>
        <button onclick="CadastrarFruta();" type="button">Cadastrar</button>

        
    <ul id="listaFrutas">
        <li class="corsim">Abacaxi</li>
        <li class="cornao">Morango</li>
        <li class="corsim">Limao</li>
        <li class="cornao">Jabuticaba</li>
    </ul>

    <script>
        function CadastrarFruta(){
            const fruta = document.getElementById("fruta").value;
            const nomeClasse = document.getElementById("nomeClasse").value;
            const listaFrutas = document.getElementById("listaFrutas");

            // console.log(fruta);
            // console.log(nomeClasse);
            // console.log(listaFrutas);

            if( fruta.trim().length == 0 || nomeClasse.trim().length == 0) { 
                alert("Preencha todos os campos!");
                return false;
            }

            //cadastrar a fruta
               listaFrutas.innerHTML += `<li class="${nomeClasse}"> ${fruta}</li>`;

            document.getElementById("fruta").value = "";
            document.getElementById("nomeClasse").value = "";            

        }
    </script>

</body>
</html>
